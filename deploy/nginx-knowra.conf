# Nginx vhost for Knowra. Co-exists with other sites on the same box.
#
# Install:
#   sudo cp /opt/knowra/deploy/nginx-knowra.conf /etc/nginx/sites-available/knowra
#   sudo ln -s /etc/nginx/sites-available/knowra /etc/nginx/sites-enabled/knowra
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue TLS cert (after DNS resolves to this server):
#   sudo certbot --nginx -d knowra.space -d www.knowra.space \
#     --non-interactive --agree-tos -m you@example.com --redirect
#
# Certbot will rewrite this file in-place to add the listen 443 / ssl_*
# directives and the http→https redirect. That's fine — just keep this
# file as the source of truth and re-copy it if you ever need to redo
# the cert from scratch.

server {
    listen 80;
    listen [::]:80;
    server_name knowra.space www.knowra.space;

    # Body size: card payloads are tiny, but allow some headroom for
    # future image uploads / debug endpoints.
    client_max_body_size 2m;

    # Hashed Next.js bundles — cache forever, immutable.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3033;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else goes to the Next.js process on 3033.
    location / {
        proxy_pass http://127.0.0.1:3033;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade headers (cheap to set; needed if we ever add
        # streaming routes).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Long-poll friendly timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Security headers — same set we had in the Caddyfile.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Access logs scoped to this site only (easier to grep).
    access_log /var/log/nginx/knowra-access.log;
    error_log  /var/log/nginx/knowra-error.log;
}
